services:
  backend:
    build: ./backend

    ports:
      - "3000:3000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres

    volumes:
      - ./backend:/app
      - /app/node_modules

    command: npm run dev

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: devops_password
      POSTGRES_DB: devops_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: